# =============================================================================
# slackwire :: GitLab CI/CD pipeline
# =============================================================================
# This pipeline builds, tests, scans, dockerizes, dogfoods (posts a morphing
# Slack card about itself), publishes to npm with provenance, and deploys docs.
#
# It is written to be CORRECT and to DEGRADE GRACEFULLY before all external
# setup exists. Concretely:
#   - The dogfood stage is a NO-OP unless $SLACK_TOKEN is configured.
#   - The release stage only runs on version tags (vX.Y.Z).
#   - The security templates are inert until the matching GitLab security
#     features are enabled on the project.
#
# See docs/deployment.md for the human checklist of external prerequisites
# (GitLab project + GitHub push mirror, CI/CD variables, security features,
# npm Trusted Publishing, Pages).
# =============================================================================

stages:
  - test
  - build
  - security
  - dogfood
  - release
  - pages

# -----------------------------------------------------------------------------
# Global variables
# -----------------------------------------------------------------------------
variables:
  # pnpm store lives inside the project dir so GitLab CI can cache it.
  PNPM_STORE: "$CI_PROJECT_DIR/.pnpm-store"
  # Pin the pnpm major to match the repo (Dockerfile uses pnpm@9, lockfile v9).
  PNPM_VERSION: "9"

# =============================================================================
# Managed security templates (security stage)
# =============================================================================
# These are GitLab-maintained templates. The jobs they define are assigned to
# the `test` stage by default, so we re-stage them into `security` below.
#
# PREREQUISITE: each of these requires the corresponding security feature to be
# enabled/licensed on the GitLab project (Settings -> Security & Compliance, or
# Ultimate-tier features for some scanners). Until then the jobs are simply
# absent or no-op; they will not break the pipeline.
#
# Template paths follow the current GitLab "Jobs/*" convention.
include:
  - template: Jobs/SAST.gitlab-ci.yml                 # Semgrep-based SAST
  - template: Jobs/Secret-Detection.gitlab-ci.yml     # leaked-credential scan
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml  # vulnerable deps
  - template: Jobs/Container-Scanning.gitlab-ci.yml    # scans the built image

# Re-stage the managed jobs into the `security` stage. (The templates default
# them to `test`; we override only the stage, leaving their logic intact.)
sast:
  stage: security
secret_detection:
  stage: security
dependency_scanning:
  stage: security
# Container scanning targets the image built in the `build` stage. We point it
# at the per-commit tag pushed by the `build:image` job below.
container_scanning:
  stage: security
  variables:
    CS_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  needs:
    - job: build:image
      artifacts: false
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# =============================================================================
# TEST STAGE
# =============================================================================
# Runs on every push and merge request. Installs the workspace with a frozen
# lockfile, then lints, builds, and tests every package recursively.
test:
  stage: test
  image: node:22
  # Cache the pnpm content-addressable store keyed on the lockfile so installs
  # are fast and deterministic across pipelines.
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
  script:
    - pnpm -r lint
    - pnpm -r build
    - pnpm -r test
  rules:
    # Run on merge requests and on any branch push (and tags).
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# COVERAGE  ::  v8 coverage gate (per-package thresholds in vitest.config.ts)
# =============================================================================
# Runs the v8-instrumented suite in every package and fails the pipeline if any
# package drops below the floors declared in its vitest.config.ts. The floors
# sit a few points below measured coverage, so this is a regression guard, not a
# flaky ceiling. It is BLOCKING (no allow_failure): the gate was verified to
# pass locally with >=6 points of margin on every metric, which comfortably
# absorbs minor cross-Node-version variance in v8 branch counting.
#
# The lcov + text reports are kept as artifacts for inspection on each run.
test:coverage:
  stage: test
  image: node:22
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
    # Build first: the CLI entry test bundles src/main.ts with esbuild, which
    # resolves @slackwire/core to its dist/. On a clean runner that dist does
    # not exist yet, so the bundle (and the job) fails without a prior build.
    - pnpm -r build
  script:
    - pnpm -r test:coverage
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - packages/core/coverage/
      - packages/cli/coverage/
      - packages/mcp/coverage/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# COMMIT EMAIL GUARD  ::  privacy safety net for leaked personal authorship
# =============================================================================
# WHY: a commit carries TWO email fields, author AND committer. Server-side
# merges performed by GitLab have twice stamped the maintainer's personal
# address into the COMMITTER field even when the author was correct, leaking a
# private address into public history. This job is the detection layer for that
# leak.
#
# WHAT: it scans both the author (%ae) and committer (%ce) email of every commit
# reachable from the current pipeline commit and FAILS the pipeline if the one
# forbidden personal address appears. The address is NEVER hardcoded in this
# public file; it is supplied at runtime by the MASKED project CI/CD variable
# $FORBIDDEN_EMAIL (Settings -> CI/CD -> Variables). We block ONLY that exact
# address, never a whole provider domain, so future contributors using a
# personal address are not blocked by false positives.
#
# SHALLOW CLONE: GitLab clones to a shallow depth (ci_default_git_depth). We try
# a best-effort unshallow so more history is checked, but never fail the job if
# unshallow is impossible; the reachable history is enough to catch new leaks.
#
# FORK SAFETY: forked-project MR pipelines do NOT receive project CI/CD
# variables, so $FORBIDDEN_EMAIL is empty there. In that case there is nothing
# to enforce: the job prints a notice and passes (exit 0) rather than failing on
# a missing secret.
#
# Runs fast and early in the `test` stage on every branch, MR, and tag so it
# gates the whole pipeline quickly.
guard:commit-email:
  stage: test
  image: node:22
  # NOTE: FORBIDDEN_EMAIL is intentionally NOT declared here. It is inherited
  # from the MASKED project CI/CD variable so the address stays out of this
  # public file. Only the clone-depth knob is set locally.
  variables:
    # Shallow clone is fine; we unshallow best-effort below.
    GIT_DEPTH: "0"
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    # Best-effort: pull full history so older commits are also checked. Never
    # let an inability to unshallow (already complete, no remote) fail the job.
    - git fetch --unshallow 2>/dev/null || true
    - |
      # If no forbidden address is configured (e.g. a fork MR pipeline receives
      # no project variables), there is nothing to enforce: skip and pass.
      if [ -z "$FORBIDDEN_EMAIL" ]; then
        echo "no FORBIDDEN_EMAIL configured; skipping"
        exit 0
      fi
      # Build "<hash> <author-email> <committer-email>" per reachable commit and
      # look for the forbidden address in either email field.
      MATCHES=$(git log --pretty=format:'%H %ae %ce' | grep -F "$FORBIDDEN_EMAIL" || true)
      if [ -n "$MATCHES" ]; then
        echo "FAIL: forbidden personal email '$FORBIDDEN_EMAIL' found in commit authorship:"
        echo "$MATCHES"
        exit 1
      fi
      echo "OK: no '$FORBIDDEN_EMAIL' in author or committer of any reachable commit."
  rules:
    # Run on merge requests and on any branch push (and tags).
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# DEPENDENCY AUDIT  ::  pnpm audit gate (no GitLab license required)
# =============================================================================
# Fails the pipeline on a known HIGH or CRITICAL advisory in the dependency
# tree. Unlike the managed Dependency-Scanning template, `pnpm audit` needs no
# GitLab security license, so it works on any tier.
audit:dependencies:
  stage: test
  # Blocking gate. The single ignored advisory (GHSA-fx2h-pf6j-xcff) is a vite
  # advisory pulled transitively by vitest; vite is a DEV-only dependency, never
  # shipped in a published package, and has no fix without a vitest major bump.
  # It is explicitly suppressed via pnpm.auditConfig.ignoreGhsas in package.json.
  image: node:22
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
  script:
    - pnpm audit --audit-level=high
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# BUILD STAGE
# =============================================================================
# Builds the distroless image from the repo Dockerfile and pushes it to the
# GitLab Container Registry.
#
# Build engine choice: docker:dind with `docker build`. Kaniko also works for
# distroless and needs no privileged runner, but docker-in-docker is simpler to
# reason about and is the GitLab default documented path. If your runners are
# unprivileged, switch this job to kaniko.
#
# PREREQUISITE: the GitLab Container Registry must be enabled on the project
# (it is on by default for gitlab.com). $CI_REGISTRY, $CI_REGISTRY_IMAGE,
# $CI_REGISTRY_USER, and $CI_REGISTRY_PASSWORD are injected automatically by
# GitLab for the job's own project registry.
build:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # Always tag the immutable per-commit image.
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    # On a version tag, also publish the tag name and `latest`.
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    # Build on the default branch and on semver version tags only (not on every MR).
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# =============================================================================
# DOGFOOD STAGE  ::  slackwire posting a build-status card about itself
# =============================================================================
# This is the project eating its own dog food: it uses the freshly built image
# to post a "running" Slack card, then live-morphs it to "passed" or "failed"
# when the pipeline finishes. It mirrors the canonical recipe in
# docs/gitlab-integration.md.
#
# REQUIRED CI/CD VARIABLES (set in Settings -> CI/CD -> Variables):
#   SLACK_TOKEN    Slack bot (xoxb-) or user (xoxp-) token. Mark masked+protected.
#   SLACK_CHANNEL  Target channel ID (e.g. C0EXAMPLE123) or name.
#
# GRACEFUL DEGRADATION: every dogfood job is gated on `rules: - if: '$SLACK_TOKEN'`.
# With no token configured, none of these jobs are created and the pipeline is
# unaffected. This is why a fresh GitLab import "just works" before secrets exist.
#
# IMAGE: these jobs run on node:22 (a shell-capable image) and invoke the CLI
# we build in-job. The distroless image from the Dockerfile has NO shell, so a
# `script:` block cannot run there. slackwire is also not published to npm yet,
# so we cannot `npx slackwire` from the registry; instead we build the workspace
# (corepack + pnpm install + pnpm -r build) and run the freshly built bundle at
# packages/cli/dist/bundle.cjs directly with node.
#
# NOTE: we morph with plain --text rather than --template here to keep the job
# self-contained (no catalog wiring). Set SLACK_CATALOG and pass --template if
# you want the cicd-live template instead.

dogfood:running:
  stage: dogfood
  # `.pre`-style behaviour: this job runs early via stage ordering, posts the
  # initial card, and hands the Slack ts forward through a dotenv artifact.
  image: node:22
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
    - pnpm -r build
  script:
    - |
      node packages/cli/dist/bundle.cjs post \
        --channel "$SLACK_CHANNEL" \
        --text ":hourglass_flowing_sand: slackwire pipeline *running* for \`$CI_COMMIT_REF_NAME\` (pipeline $CI_PIPELINE_ID)" \
        | tee slack.out
    - echo "SLACK_TS=$(cut -f1 slack.out)" >> dogfood.env
  artifacts:
    reports:
      dotenv: dogfood.env
  rules:
    - if: '$SLACK_TOKEN'

dogfood:passed:
  stage: dogfood
  image: node:22
  # `needs:` is correct on the SUCCESS path: it pulls the dotenv ts forward.
  needs:
    - job: dogfood:running
      artifacts: true
    - job: test
      artifacts: false
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
    - pnpm -r build
  script:
    - |
      node packages/cli/dist/bundle.cjs update \
        --channel "$SLACK_CHANNEL" \
        --ts "$SLACK_TS" \
        --text ":white_check_mark: slackwire pipeline *passed* for \`$CI_COMMIT_REF_NAME\` (pipeline $CI_PIPELINE_ID)"
  rules:
    - if: '$SLACK_TOKEN'
      when: on_success

dogfood:failed:
  stage: dogfood
  image: node:22
  # CRITICAL GOTCHA (see docs/gitlab-integration.md): use `dependencies:` here,
  # NOT `needs:`. A downstream job that `needs:` a FAILED job enters the amber
  # "blocked" state and never runs, so the failure card would never be posted.
  # `dependencies:` only controls artifact download, not execution ordering, so
  # this job still fires on `when: on_failure`.
  dependencies:
    - dogfood:running
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
    - pnpm -r build
  script:
    - |
      node packages/cli/dist/bundle.cjs update \
        --channel "$SLACK_CHANNEL" \
        --ts "$SLACK_TS" \
        --text ":x: slackwire pipeline *failed* for \`$CI_COMMIT_REF_NAME\` (pipeline $CI_PIPELINE_ID)"
  rules:
    - if: '$SLACK_TOKEN'
      when: on_failure

# =============================================================================
# RELEASE STAGE  ::  npm publish with Trusted Publishing (OIDC, no stored token)
# =============================================================================
# Publishes @slackwire/core, @slackwire/mcp, and slackwire to the public npm
# registry on every semver tag (vX.Y.Z). NO NPM_TOKEN is stored anywhere:
# authentication is short-lived OIDC via npm Trusted Publishing, and provenance
# is emitted via the explicit `--provenance` flag (signed with SIGSTORE_ID_TOKEN).
#
# Because the internal deps use the `workspace:*` protocol, we `pnpm pack` each
# package (which rewrites `workspace:*` to the concrete version) and then publish
# the resulting tarballs with the npm CLI (OIDC + provenance are npm-CLI-only).
#
# PREREQUISITES (all configured ONCE, externally, before the first tag):
#   1. On npmjs.com, add a "trusted publisher" for EACH package
#      (slackwire, @slackwire/core, @slackwire/mcp) pointing at THIS GitLab
#      project and THIS job (release:npm). See docs/deployment.md.
#      Docs: https://docs.npmjs.com/trusted-publishers/
#   2. Toolchain: npm CLI >= 11.5.1 and Node >= 22.14 are required for trusted
#      publishing. We start from node:22 and force-upgrade npm below.
#   3. The GitLab repo must be PUBLIC for npm provenance to be accepted.
#   4. The `id_tokens:` block below mints the two OIDC tokens npm expects:
#      NPM_ID_TOKEN (aud `npm:registry.npmjs.org`) for auth, and
#      SIGSTORE_ID_TOKEN (aud `sigstore`) for provenance signing.
release:npm:
  stage: release
  image: node:22
  # OIDC: GitLab injects these signed JWTs as env vars for the job.
  #   NPM_ID_TOKEN      -> npm Trusted Publishing AUTH. The npm CLI (>=11.5.1)
  #                        reads this on GitLab CI to mint a short-lived publish
  #                        token. Audience MUST be "npm:registry.npmjs.org".
  #   SIGSTORE_ID_TOKEN -> npm PROVENANCE. On GitLab, libnpmpublish requires an
  #                        id_token with the "sigstore" audience to sign the
  #                        provenance attestation. Without it, `--provenance` fails.
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    # Fail fast if the three publishable package versions do not all equal the
    # tag (vX.Y.Z -> X.Y.Z). Prevents shipping a tag whose package.json drifted.
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      for pkg in packages/core packages/cli packages/mcp; do
        PKG_VERSION="$(node -p "require('./$pkg/package.json').version")"
        if [ "$PKG_VERSION" != "$VERSION" ]; then
          echo "FAIL: $pkg version $PKG_VERSION does not match tag version $VERSION"
          exit 1
        fi
      done
      echo "OK: all publishable package versions match tag $VERSION"
    # Trusted publishing needs a very recent npm; force the latest to be safe.
    - npm install -g npm@latest
    - node --version
    - npm --version   # must be >= 11.5.1
    - corepack enable || npm install -g pnpm@${PNPM_VERSION}
    - pnpm config set store-dir "$PNPM_STORE"
    - pnpm install --frozen-lockfile
    - pnpm -r build
  script:
    # WHY npm CLI (not `pnpm publish`): both `slackwire` (cli) and @slackwire/mcp
    # depend on @slackwire/core via the `workspace:*` protocol. npm does NOT
    # rewrite `workspace:*` on publish, but `pnpm pack` DOES (it bakes the
    # concrete version into the tarball's package.json). And npm Trusted
    # Publishing (OIDC) + provenance are npm-CLI-only (pnpm will not use the
    # OIDC token). So we get both: pnpm packs (rewriting workspace deps), then
    # the npm CLI publishes each tarball with OIDC auth + provenance.
    #
    # This path can only be fully exercised on a real semver tag (it cannot run
    # in a branch pipeline), so it is verified by reasoning + `glab ci lint`,
    # not by publishing.
    - VERSION="${CI_COMMIT_TAG#v}"
    - mkdir -p "$CI_PROJECT_DIR/dist-packs"
    - pnpm -C packages/core pack --pack-destination "$CI_PROJECT_DIR/dist-packs"
    - pnpm -C packages/cli pack --pack-destination "$CI_PROJECT_DIR/dist-packs"
    - pnpm -C packages/mcp pack --pack-destination "$CI_PROJECT_DIR/dist-packs"
    # Publish core first (cli + mcp depend on it). --access public is required
    # for the first publish of the scoped packages; harmless for the unscoped
    # `slackwire`. --provenance emits the signed attestation.
    - npm publish "$CI_PROJECT_DIR/dist-packs/slackwire-core-${VERSION}.tgz" --access public --provenance
    - npm publish "$CI_PROJECT_DIR/dist-packs/slackwire-${VERSION}.tgz" --access public --provenance
    - npm publish "$CI_PROJECT_DIR/dist-packs/slackwire-mcp-${VERSION}.tgz" --access public --provenance
  rules:
    # Only ever runs on a pushed semver version tag (vX.Y.Z).
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# =============================================================================
# PAGES STAGE  ::  GitLab Pages docs site
# =============================================================================
# GitLab Pages serves whatever the `pages` job leaves in `public/`. We publish
# the existing self-contained HTML docs (docs/site/index.html) as-is.
#
# NOTE: this serves the already-built, self-contained HTML documentation. A
# VitePress (or similar) build is a future upgrade; when that lands, replace the
# copy step with the static-site build and emit into `public/`.
#
# PREREQUISITE: GitLab Pages must be enabled (on by default for gitlab.com).
pages:
  stage: pages
  image: node:22
  script:
    - mkdir -p public
    - cp -r docs/site/. public/
  artifacts:
    paths:
      - public
  rules:
    # Deploy docs only from the default branch.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
